name: SIEP CI

on:
  push:
    branches: [main, develop, 'feat/**', 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Django Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: siep_test
          POSTGRES_USER: siep
          POSTGRES_PASSWORD: siep_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - '5432:5432'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          cd backend_django
          pip install -r requirements.txt --break-system-packages
      - name: Run tests
        env:
          DB_NAME: siep_test
          DB_USER: siep
          DB_PASSWORD: siep_test
          DB_HOST: localhost
          DB_PORT: '5432'
          DJANGO_SETTINGS_MODULE: psychosim.settings.test
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          AI_ASSISTANT_API_KEY: ''
        run: |
          cd backend_django
          python manage.py test --verbosity=2
      - name: Check migrations consistency
        env:
          DB_NAME: siep_test
          DB_USER: siep
          DB_PASSWORD: siep_test
          DB_HOST: localhost
          DB_PORT: '5432'
          DJANGO_SETTINGS_MODULE: psychosim.settings.test
          DJANGO_SECRET_KEY: test-secret-key-for-ci
        run: |
          cd backend_django
          python manage.py migrate --check

  frontend:
    name: Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Lint
        run: cd frontend && npx ng lint || true
      - name: Build prod
        run: cd frontend && npx ng build --configuration=production
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: frontend/coverage
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
      - name: Python deps audit
        run: |
          pip install pip-audit --break-system-packages
          cd backend_django && pip-audit -r requirements.txt || true
      - name: Node deps audit
        run: cd frontend && npm audit --audit-level=high || true
